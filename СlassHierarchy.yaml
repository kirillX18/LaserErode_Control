classes:
  QMainWindow:
    description: "Базовый класс Qt для главного окна приложения"
    attributes:
      - "centralWidget"
      - "windowTitle"
      - "menuBar"
      - "statusBar"

  MainWindow:
    inherits: QMainWindow
    description: "Главное окно приложения"
    adds:
      - "mainNavigationWidget: QWidget"
      - "currentPage: BasePage"
      - "centralWidget: QWidget"
      - "mainLayout: QVBoxLayout"

  QWidget:
    description: "Базовый класс Qt для визуальных элементов интерфейса"
    attributes:
      - "geometry"
      - "visible"
      - "enabled"
      - "styleSheet"
      - "parent"

  BasePage:
    inherits: QWidget
    description: "Базовый класс для всех страниц интерфейса"
    adds:
      - "pageTitle: QLabel"
      - "mainLayout: QVBoxLayout"
      - "contentWidget: QWidget"
      - "contentLayout: QVBoxLayout"

  ElectrolysisProcessPage:
    inherits: BasePage
    description: "Страница процесса электролиза"
    adds:
      - "coordinatesListWidget: CoordinatesListWidget"
      - "trajectoryPreviewWidget: TrajectoryPreviewWidget"

  ServicePageBase:
    inherits: BasePage
    description: "Базовый заготовочный класс для всех страниц сервисного управления"
    adds:
      - "servicePageLayout: QVBoxLayout"
      - "serviceContentWidget: QWidget"
      - "serviceContentLayout: QVBoxLayout"

  AxisControlPage:
    inherits: ServicePageBase
    description: "Страница управления по осям X, Y, Z"
    adds:
      - "xControl: ParameterControlWidget"
      - "yControl: ParameterControlWidget"
      - "zControl: ParameterControlWidget"
      - "axisLayout: QVBoxLayout"

  JointControlPage:
    inherits: ServicePageBase
    description: "Страница управления по суставам J0-J5"
    adds:
      - "j0Control: CompactParameterControlWidget"
      - "j1Control: CompactParameterControlWidget"
      - "j2Control: CompactParameterControlWidget"
      - "j3Control: CompactParameterControlWidget"
      - "j4Control: CompactParameterControlWidget"
      - "j5Control: CompactParameterControlWidget"
      - "jointLayout: QGridLayout"

  TrajectoryPage:
    inherits: ServicePageBase
    description: "Страница задания траектории по координатам X, Y, Z"
    adds:
      - "pointInputWidget: TrajectoryPointInputWidget"
      - "pointActionsWidget: PointActionsWidget"
      - "coordinatesListWidget: CoordinatesListWidget"
      - "trajectoryPreviewWidget: TrajectoryPreviewWidget"
      - "trajectoryPageLayout: QVBoxLayout"

  JointTrajectoryPage:
    inherits: ServicePageBase
    description: "Страница задания траектории по суставам J0-J5"
    adds:
      - "pointInputWidget: JointTrajectoryPointInputWidget"
      - "pointActionsWidget: PointActionsWidget"
      - "coordinatesListWidget: CoordinatesListWidget"
      - "trajectoryPreviewWidget: TrajectoryPreviewWidget"
      - "jointTrajectoryPageLayout: QVBoxLayout"

  LaserControlPage:
    inherits: ServicePageBase
    description: "Страница управления параметрами лазера"
    adds:
      - "powerControl: ParameterControlWidget"
      - "frequencyControl: ParameterControlWidget"
      - "focusOffsetControl: ParameterControlWidget"
      - "pulseDurationControl: ParameterControlWidget"
      - "exposureTimeControl: ParameterControlWidget"
      - "laserModeWidget: LaserModeWidget"
      - "laserPageLayout: QGridLayout"

  WorkParametersPage:
    inherits: ServicePageBase
    description: "Страница рабочих параметров"
    adds:
      - "speedControl: ParameterControlWidget"
      - "workParametersLayout: QVBoxLayout"

  ErosionWaterControlPage:
    inherits: ServicePageBase
    description: "Страница управления эрозией и водой"
    adds:
      - "erosionControlGroup: ControlButtonGroupWidget"
      - "waterControlGroup: ControlButtonGroupWidget"
      - "erosionWaterLayout: QVBoxLayout"

  BaseControlWidget:
    inherits: QWidget
    description: "Базовый класс для управляющих и вспомогательных виджетов"
    adds:
      - "titleLabel: QLabel"
      - "widgetLayout: QLayout"
      - "frameContainer: QFrame"

  BaseParameterControlWidget:
    inherits: BaseControlWidget
    description: "Базовый класс управления одним параметром"
    adds:
      - "parameterNameLabel: QLabel"
      - "currentValueLabel: QLabel"
      - "plusOneButton: QPushButton"
      - "minusOneButton: QPushButton"
      - "plusTenButton: QPushButton"
      - "minusTenButton: QPushButton"
      - "setButton: QPushButton"
      - "currentValue: number"
      - "smallStep: integer"
      - "largeStep: integer"

  ParameterControlWidget:
    inherits: BaseParameterControlWidget
    description: "Стандартный виджет управления параметром"
    adds:
      - "standardGridLayout: QGridLayout"

  CompactParameterControlWidget:
    inherits: BaseParameterControlWidget
    description: "Компактный виджет управления параметром"
    adds:
      - "compactGridLayout: QGridLayout"
      - "compactSpacing: integer"

  BasePointInputWidget:
    inherits: BaseControlWidget
    description: "Базовый класс для задания параметров одной точки"
    adds:
      - "inputGridLayout: QGridLayout"
      - "labels: list"
      - "valueLabels: list"
      - "plusOneButtons: list"
      - "minusOneButtons: list"
      - "plusTenButtons: list"
      - "minusTenButtons: list"
      - "pointValues: list"

  TrajectoryPointInputWidget:
    inherits: BasePointInputWidget
    description: "Виджет задания точки по координатам X, Y, Z"
    adds:
      - "xLabel: QLabel"
      - "yLabel: QLabel"
      - "zLabel: QLabel"
      - "xValue: number"
      - "yValue: number"
      - "zValue: number"

  JointTrajectoryPointInputWidget:
    inherits: BasePointInputWidget
    description: "Виджет задания точки по суставам J0-J5"
    adds:
      - "j0Label: QLabel"
      - "j1Label: QLabel"
      - "j2Label: QLabel"
      - "j3Label: QLabel"
      - "j4Label: QLabel"
      - "j5Label: QLabel"
      - "jointValues: list"

  PointActionsWidget:
    inherits: BaseControlWidget
    description: "Виджет действий над точками траектории"
    adds:
      - "addPointButton: QPushButton"
      - "deletePointButton: QPushButton"
      - "clearAllButton: QPushButton"
      - "returnToZeroButton: QPushButton"
      - "actionsLayout: QHBoxLayout"

  LaserModeWidget:
    inherits: BaseControlWidget
    description: "Виджет выбора режима работы лазера"
    adds:
      - "modeTitleLabel: QLabel"
      - "continuousModeButton: QPushButton"
      - "pulseModeButton: QPushButton"
      - "singlePulseModeButton: QPushButton"
      - "selectedMode: string"
      - "modeLayout: QVBoxLayout"

  ControlButtonGroupWidget:
    inherits: BaseControlWidget
    description: "Универсальный кнопочный блок для групп команд управления"
    adds:
      - "groupTitleLabel: QLabel"
      - "commandButtons: list"
      - "groupLayout: QVBoxLayout"

  TrajectoryPreviewWidget:
    inherits: BaseControlWidget
    description: "Виджет 3D-отображения точек и траектории"
    adds:
      - "previewArea: QFrame"
      - "points: list"
      - "trajectoryLines: list"
      - "cameraPosition: tuple"
      - "scaleFactor: float"

  CoordinatesListWidget:
    inherits: BaseControlWidget
    description: "Виджет вывода списка точек"
    adds:
      - "pointsListLabel: QLabel"
      - "pointsOutputArea: QTextEdit"
      - "pointsData: list"